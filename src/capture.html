<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Capture</title>
  <style>
    html, body {
      height: 100%; margin: 0; overflow: hidden;
      user-select: none; background: transparent;
    }
    *, *::before, *::after { cursor: default !important; }
  </style>
</head>
<body>
  <script>
    let start = null;

    window.api.onCaptureInit(() => {});

    document.addEventListener('mousedown', (e) => {
      start = { x: e.clientX, y: e.clientY };
    });

    document.addEventListener('mouseup', (e) => {
      if (!start) return;
      const r = {
        x: Math.min(start.x, e.clientX),
        y: Math.min(start.y, e.clientY),
        w: Math.abs(start.x - e.clientX),
        h: Math.abs(start.y - e.clientY)
      };
      start = null;
      if (r.w < 3 || r.h < 3) { window.api.captureDone(null); return; }
      window.api.captureDone(r);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.api.captureDone(null);
    });
  </script>
</body>
</html>
