<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Sticky Note</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    body { background: #fef3c7; color: #18181b; display: flex; flex-direction: column; user-select: none; }
    .drag { -webkit-app-region: drag; }
    .no-drag { -webkit-app-region: no-drag; }
    header {
      display: flex; align-items: center; gap: 4px; padding: 8px;
      background: #fde68a; border-bottom: 1px solid #fbbf24; cursor: move;
    }
    button {
      width: 24px; height: 24px; border: none; border-radius: 4px;
      background: transparent; color: #92400e; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #fcd34d; }
    #title { flex: 1; font-weight: 700; font-size: 13px; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #close { font-size: 18px; line-height: 1; }
    #body { flex: 1; padding: 12px; font-size: 13px; line-height: 1.5; overflow-y: auto; white-space: pre-wrap; user-select: text; }
    #body mark { background: #fbbf24; padding: 0 2px; border-radius: 2px; }
    #body b, #body strong { font-weight: 700; }
  </style>
</head>
<body>
  <header class="drag">
    <button id="prev" class="no-drag" title="Previous">&#9664;</button>
    <button id="next" class="no-drag" title="Next">&#9654;</button>
    <span id="title">Sticky Note</span>
    <button id="close" class="no-drag">&times;</button>
  </header>
  <div id="body"></div>

  <script>
    const allowed = new Set(['B', 'STRONG', 'MARK', 'BR']);
    function sanitize(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      (function walk(n) {
        for (const c of [...n.childNodes]) {
          if (c.nodeType === 1) {
            if (!allowed.has(c.tagName)) {
              while (c.firstChild) n.insertBefore(c.firstChild, c);
              n.removeChild(c);
            } else {
              for (const a of [...c.attributes]) c.removeAttribute(a.name);
              walk(c);
            }
          }
        }
      })(tmp);
      return tmp.innerHTML;
    }

    window.api.onStickyData((note) => {
      document.getElementById('title').textContent = note.title || 'Sticky Note';
      const body = document.getElementById('body');
      if (note.html) body.innerHTML = sanitize(note.html);
      else body.textContent = note.content || '';
    });
    document.getElementById('close').addEventListener('click', () => window.api.closeSticky());
    document.getElementById('prev').addEventListener('click', () => window.api.stickyNav(-1));
    document.getElementById('next').addEventListener('click', () => window.api.stickyNav(1));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') window.api.stickyNav(-1);
      else if (e.key === 'ArrowRight') window.api.stickyNav(1);
      else if (e.key === 'Escape') window.api.closeSticky();
    });
  </script>
</body>
</html>
