<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Capture</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; cursor: crosshair; user-select: none; }
    #bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #shade { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    #sel {
      position: absolute; border: 2px solid #3b82f6;
      background: rgba(59,130,246,0.15); box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
      display: none;
    }
    #hint {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 6px 12px;
      border-radius: 6px; font: 12px sans-serif; pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="bg" />
  <div id="shade"></div>
  <div id="sel"></div>
  <div id="hint">Drag to select area &middot; Esc to cancel</div>

  <script>
    const sel = document.getElementById('sel');
    const shade = document.getElementById('shade');
    let start = null;

    window.api.onCaptureInit((d) => {
      document.getElementById('bg').src = d.dataURL;
    });

    function rect(a, b) {
      return {
        x: Math.min(a.x, b.x), y: Math.min(a.y, b.y),
        w: Math.abs(a.x - b.x), h: Math.abs(a.y - b.y)
      };
    }

    document.addEventListener('mousedown', (e) => {
      start = { x: e.clientX, y: e.clientY };
      shade.style.display = 'none';
      sel.style.display = 'block';
      sel.style.left = start.x + 'px';
      sel.style.top = start.y + 'px';
      sel.style.width = '0px';
      sel.style.height = '0px';
    });

    document.addEventListener('mousemove', (e) => {
      if (!start) return;
      const r = rect(start, { x: e.clientX, y: e.clientY });
      sel.style.left = r.x + 'px';
      sel.style.top = r.y + 'px';
      sel.style.width = r.w + 'px';
      sel.style.height = r.h + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!start) return;
      const r = rect(start, { x: e.clientX, y: e.clientY });
      start = null;
      if (r.w < 3 || r.h < 3) { window.api.captureDone(null); return; }
      window.api.captureDone(r);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.api.captureDone(null);
    });
  </script>
</body>
</html>
